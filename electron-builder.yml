appId: com.vincony.desktop
productName: Vincony
copyright: © Vincony AI Ltd

directories:
  output: release
  buildResources: build

# Only ship the compiled main/preloads + icons + the production deps (electron-updater).
files:
  - dist/**/*
  - package.json
  - "!**/*.ts"
  - "!src/**/*"

# Auto-update + download feed. electron-builder writes app-update.yml from this so
# electron-updater knows where to look. Replace owner/repo if the repo name changes.
publish:
  provider: github
  owner: bryanflowers
  repo: vincony-desktop

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  # Code-signing is driven by env vars in CI (CSC_LINK = base64 .pfx, CSC_KEY_PASSWORD).
  # When they're absent (local dev) the build is simply unsigned.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Vincony
  # Fixed name so the website can deep-link the newest installer:
  # https://github.com/bryanflowers/vincony-desktop/releases/latest/download/VinconySetup.exe
  artifactName: VinconySetup.exe

# Notarization runs in an afterSign hook that no-ops when the Apple creds are
# absent (so an unsigned validation build still succeeds).
afterSign: scripts/notarize.cjs

mac:
  target:
    - target: dmg
      # One universal binary (arm64 + x64) → a single Vincony.dmg that runs natively
      # on Apple Silicon and Intel. Avoids two arch builds writing to the same fixed
      # artifactName concurrently (which raced hdiutil and broke dmg creation on CI).
      arch: [universal]
  icon: build/icon.png # electron-builder generates the .icns from this 512px source
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing is driven by env in CI (CSC_LINK = base64 .p12, CSC_KEY_PASSWORD);
  # notarization by APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID.

dmg:
  artifactName: Vincony.dmg # stable: releases/latest/download/Vincony.dmg
